#                    │ ◉◉ │     │ ◉◉ │     │ ◉◉ │
#                     ╲▂▂╱  ╲   │╱  ╲│   ╱  ╲▂▂╱
#                       ╲    ╲▁▁▁▁▁▁▁╱    ╱
#                        ╲▁▁▁▁▁▁▁▁▁▁▁▁▁▁╱
#                           │ CERBERUS │
#                           │▓▓▓▓▓▓▓▓▓▓│
#                          ╱│          │╲
#                         ╱ │          │ ╲
#                        ╱  │          │  ╲
#                      ╱▔╲ ╱▔╲        ╱▔╲ ╱▔╲
#                     │░░│ │░░│      │░░│ │░░│
#                      ▔▔   ▔▔        ▔▔   ▔▔
#
#           « None shall merge without passing all three heads »
#
#              HEAD 1: Lint  │  HEAD 2: Test  │  HEAD 3: Build
#
# ──────────────────────────────────────────────────────────────

# Cerberus (Κέρβερος) - Three-headed guardian of the underworld
# https://www.wikiwand.com/en/articles/Cerberus
#
# Named after the three-headed hound guarding the gates of the underworld.
# Like its mythological counterpart, this workflow acts as a guardian,
# ensuring code quality through multiple checks (tests, builds, lint)
# before allowing passage to the next stage.

name: Cerberus

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.ref }}
  cancel-in-progress: true

jobs:
  hecate:
    uses: ./.github/workflows/hecate.yml

  shellcheck-only:
    needs: hecate
    if: needs.hecate.outputs.shell-only == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc

      - name: Install npm 11
        run: npm install -g npm@11

      - name: Install dependencies
        run: npm ci

      - name: Run shellcheck
        run: npm run lint:sh

  # Lightweight lint job for docs/config-only changes
  # Runs full lint but skips tests and build
  lint-only:
    needs: hecate
    if: needs.hecate.outputs.docs-only == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc

      - name: Install npm 11
        run: npm install -g npm@11

      - name: Install dependencies
        run: npm ci

      - name: Install platform-specific binaries
        run: bash scripts/install-platform-binaries.sh

      - name: Lint
        run: npm run lint

  test:
    needs: hecate
    if: needs.hecate.outputs.app-changed == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc

      - name: Install npm 11
        run: npm install -g npm@11

      - name: Install dependencies
        run: npm ci

      - name: Install platform-specific binaries
        run: bash scripts/install-platform-binaries.sh @rollup/rollup-linux-x64-gnu @unrs/resolver-binding-linux-x64-gnu

      - name: Lint
        run: npm run lint
        env:
          SHELLCHECK_PATH: /usr/bin/shellcheck

      - name: Run unit tests with coverage
        run: npm run test:cov

      - name: Store PR coverage
        run: bash scripts/store-coverage.sh pr-coverage.json

      - name: Restore base branch coverage from cache
        id: cache-coverage
        uses: actions/cache/restore@v4
        with:
          path: /tmp/base-coverage/coverage-summary.json
          # Use prefix matching to get the most recent main branch coverage
          # GitHub cache returns the most recently created cache matching the prefix
          key: coverage-main-${{ github.event.pull_request.base.sha }}
          restore-keys: |
            coverage-main-

      - name: Prepare base coverage for comparison
        run: bash scripts/prepare-base-coverage.sh

      - name: Compare coverage and comment
        uses: actions/github-script@v7
        with:
          script: |
            const compareAndComment = require('./scripts/compare-coverage.cjs');
            await compareAndComment({ github, context });

  # Compare Expo fingerprint against cached main baseline to detect native changes
  # Runs in parallel with test; build is skipped when only JS/TS changed
  fingerprint:
    needs: hecate
    if: needs.hecate.outputs.app-changed == 'true'
    continue-on-error: true # Don't block build if fingerprint check fails
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
    outputs:
      native-changed: ${{ steps.compare.outputs.native-changed }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc

      - name: Install npm 11
        run: npm install -g npm@11

      - name: Install dependencies
        run: npm ci

      - name: Restore base fingerprint from cache
        id: cache-fingerprint
        uses: actions/cache/restore@v4
        with:
          path: /tmp/base-fingerprint/fingerprint.json
          key: fingerprint-main-${{ github.event.pull_request.base.sha }}
          restore-keys: |
            fingerprint-main-

      - name: Compare fingerprints
        id: compare
        run: bash scripts/compare-fingerprint.sh

      - name: Update fingerprint PR comment
        uses: actions/github-script@v7
        with:
          script: |
            const nativeChanged = '${{ steps.compare.outputs.native-changed }}';
            await require('./scripts/fingerprint-comment.cjs')({ github, context, nativeChanged });

  build:
    needs: [test, hecate, fingerprint]
    # Only build if: tests passed, not a draft PR, native changes detected,
    # AND (this push contains app changes OR PR was just marked ready with app changes)
    if: >-
      needs.test.result == 'success'
      && needs.fingerprint.outputs.native-changed != 'false'
      && github.event.pull_request.draft == false
      && (needs.hecate.outputs.app-changed-this-push == 'true'
          || (github.event.action == 'ready_for_review'
              && needs.hecate.outputs.app-changed == 'true'))
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: read
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Create google-services.json from secret
        run: |
          printf '%s\n' "$GOOGLE_SERVICES_JSON" > google-services.json
        env:
          GOOGLE_SERVICES_JSON: ${{ secrets.GOOGLE_SERVICES_JSON }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: 🏗 Setup EAS
        uses: expo/expo-github-action@v8
        with:
          eas-version: 16.24.1
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Install npm 11
        run: npm install -g npm@11

      - name: Install dependencies
        run: npm ci --include=dev

      - name: Install rollup platform binary
        run: npm install --no-save @rollup/rollup-linux-x64-gnu

      - name: Local Build
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
          SENTRY_ORG: ${{ secrets.SENTRY_ORG }}
          SENTRY_PROJECT: ${{ secrets.SENTRY_PROJECT }}
        run: |
          npm run build:android:apk:local -- --non-interactive

      - name: Find APK file
        id: find_apk
        run: bash scripts/find-apk.sh

      - name: Create GitHub Release with APK
        id: create_release
        env:
          GH_TOKEN: ${{ github.token }}
          GITHUB_CONTEXT: ${{ toJSON(github) }}
        run: |
          bash scripts/create-release-with-apk.sh \
            '${{ steps.find_apk.outputs.apk_path }}'

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-debug-${{ github.run_number }}
          path: ${{ steps.find_apk.outputs.apk_path }}
          retention-days: 7

      - name: Notify QA on Slack
        if: success()
        continue-on-error: true
        env:
          SLACK_QA_WEBHOOK_URL: ${{ secrets.SLACK_QA_WEBHOOK_URL }}
          GH_TOKEN: ${{ github.token }}
        run: |
          bash scripts/send-slack-notification.sh \
            '${{ toJSON(github) }}' '${{ toJSON(steps) }}'

